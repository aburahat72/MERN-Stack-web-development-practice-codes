<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .child {
        height: 100px;
        width: 88vw;
        border: 2px solid red;
        padding: 15px;
        margin: 15px;
        background-color: green;
        cursor: pointer;
      }
      .childcontainer {
        border: 2px solid rgb(23, 113, 191);
        padding: 15px;
        margin: 15px;
        background-color: rgb(9, 0, 128);
      }

      .container {
        border: 2px solid aquamarine;
        padding: 15px;
        margin: 15px;
        background-color: rgb(167, 20, 196);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="childcontainer">
        <div class="child">box</div>
      </div>
    </div>
    <script>
      const getrandcolor = () => {
        let randclr1 = Math.ceil(0 + Math.random() * 255);
        let randclr2 = Math.ceil(0 + Math.random() * 255);
        let randclr3 = Math.ceil(0 + Math.random() * 255);

        return `rgb(${randclr1}, ${randclr2}, ${randclr3})`;
      };
      let box = document.querySelector(".child");
      box.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("you are clicked in box");
      });
      let childcontainer = document.querySelector(".childcontainer");
      childcontainer.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("you are clicked in childcontainer");
      });

      let container = document.querySelector(".container");
      container.addEventListener("click", (e) => {
        e.stopPropagation();
        alert("you are clicked in container");
      });

      setInterval(() => {
        document.querySelector(".container").style.backgroundColor =
          getrandcolor();
          document.querySelector(".childcontainer").style.backgroundColor =
          getrandcolor();
          document.querySelector(".child").style.backgroundColor =
          getrandcolor();
      }, 1000);
    </script>
  </body>
</html>
